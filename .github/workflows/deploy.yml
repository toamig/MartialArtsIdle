# GitHub Pages deploy — DEV deployment.
#
# This workflow builds `main` with `--mode designer`, which includes the
# admin panel (accessible at ?designer=1) and treats this URL as the dev /
# staging environment. Shipping builds come from the `release` branch via
# a separate pipeline (to be added when a shipping target is chosen).
#
# Promotion flow: when main is ready to cut a stable release, manually merge
# main into release:
#   git checkout release && git merge main && git push
# From that point, release is the source of truth for Steam / mobile /
# Electron builds until the next promotion.

name: Deploy to GitHub Pages (Dev)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Enable GitHub Pages
        continue-on-error: true
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      # Build with `designer` mode so the admin panel is accessible at
      # ?designer=1 on the deployed URL. PAT-gated, so end users visiting
      # without a token can't commit anything.
      - run: npm run build:designer
        env:
          VITE_GA_GAME_KEY:   ${{ secrets.VITE_GA_GAME_KEY }}
          VITE_GA_SECRET_KEY: ${{ secrets.VITE_GA_SECRET_KEY }}
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
